<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>Stok Barang – Toko Meduro</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;max-width:430px;margin:0 auto;font-family:'Poppins',sans-serif;background:#f1f3f6;min-height:100vh;padding-bottom:70px}

    /* HEADER */
    .header{background:linear-gradient(135deg,#3b2fc9,#5b3fd4);padding:44px 16px 14px;color:#fff;display:flex;align-items:center;justify-content:space-between}
    .header-left{display:flex;align-items:center;gap:10px}
    .header a{color:#fff;text-decoration:none;display:flex;align-items:center}
    .header a svg{width:20px;height:20px}
    .header-text h2{font-size:16px;font-weight:700}
    .header-text p{font-size:11px;opacity:0.85;margin-top:1px}

    /* STATS */
    .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px 12px 0}
    .stat{background:#fff;border-radius:10px;padding:10px 6px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
    .stat-val{font-size:18px;font-weight:700;color:#1f2937}
    .stat-label{font-size:9px;color:#6b7280;margin-top:2px}

    /* NOTIF */
    .notif-wrapper{padding:8px 12px 0}
    .notif-card{background:linear-gradient(135deg,#7c3aed,#6d28d9);border-radius:12px;padding:11px 14px;animation:slideDown 0.3s ease;position:relative}
    @keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
    .notif-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
    .notif-title{font-size:11px;font-weight:700;color:#fff;display:flex;align-items:center;gap:5px}
    .notif-count{background:rgba(255,255,255,0.25);color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px}
    .notif-item{background:rgba(255,255,255,0.12);border-radius:9px;padding:8px 11px;margin-bottom:5px;display:flex;align-items:center;gap:9px}
    .notif-item:last-child{margin-bottom:0}
    .notif-dot{width:7px;height:7px;background:#fbbf24;border-radius:50%;flex-shrink:0;animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
    .notif-item-name{font-size:11px;font-weight:600;color:#fff}
    .notif-item-sub{font-size:10px;color:rgba(255,255,255,0.75);margin-top:1px}
    .notif-close{position:absolute;top:9px;right:11px;width:18px;height:18px;cursor:pointer;color:rgba(255,255,255,0.8);background:none;border:none;display:flex;align-items:center;justify-content:center}
    .notif-close svg{width:12px;height:12px}
    .notif-card.stok{background:linear-gradient(135deg,#ea580c,#c2410c)}
    .notif-card.stok .notif-dot{background:#fff;animation:pulse 1s infinite}
    .notif-card.stok.habis{background:linear-gradient(135deg,#dc2626,#991b1b)}

    /* TOOLBAR */
    .toolbar{display:flex;gap:8px;padding:10px 12px 0;align-items:center}
    .search-wrap{flex:1;position:relative}
    .search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:#9ca3af}
    .search-wrap input{width:100%;padding:9px 10px 9px 30px;border:1.5px solid #e5e7eb;border-radius:20px;font-family:'Poppins',sans-serif;font-size:12px;background:#fff;outline:none;color:#374151}
    .search-wrap input:focus{border-color:#3b2fc9}
    .search-wrap input::placeholder{color:#9ca3af}
    .btn-add{padding:9px 12px;background:#F47C2B;border:none;border-radius:20px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;color:#fff;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px}
    .btn-add svg{width:13px;height:13px}

    /* FILTER CHIPS */
    .filter-row{padding:6px 12px 0;display:flex;gap:6px;overflow-x:auto}
    .filter-row::-webkit-scrollbar{display:none}
    .filter-chip{padding:5px 12px;border-radius:20px;border:1.5px solid #e5e7eb;background:#fff;font-family:'Poppins',sans-serif;font-size:11px;color:#6b7280;cursor:pointer;white-space:nowrap;flex-shrink:0}
    .filter-chip.active{background:#3b2fc9;color:#fff;border-color:#3b2fc9}

    /* TABLE */
    .table-wrap{margin:10px 12px 0;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,0.07)}
    table{width:100%;border-collapse:collapse;font-size:11px}
    thead tr{background:#374151}
    thead th{padding:9px 8px;text-align:left;font-weight:600;color:#fff;font-size:10px;white-space:nowrap}
    tbody tr{border-bottom:1px solid #f3f4f6}
    tbody tr:last-child{border-bottom:none}
    tbody td{padding:9px 8px;color:#374151;vertical-align:middle}
    .prod-name{font-weight:600;color:#1f2937;font-size:11px}
    .badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:99px;font-size:9px;font-weight:600}
    .badge.aman{background:#d1fae5;color:#065f46}
    .badge.habis{background:#fee2e2;color:#991b1b}
    .badge.kritis{background:#fef3c7;color:#92400e}
    .action-wrap{display:flex;gap:4px}
    .btn-act{width:26px;height:26px;border-radius:7px;border:1px solid #e5e7eb;background:#f9fafb;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .btn-act svg{width:12px;height:12px}
    .btn-act.restock{background:#fef3c7;border-color:#f59e0b;color:#b45309}
    .more-row{text-align:center;padding:10px;font-size:12px;color:#6b7280;cursor:pointer;background:#f9fafb;border-top:1px solid #f3f4f6}

    /* MODAL */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:flex-end;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:430px;padding:20px 16px 30px}
    .modal h3{font-size:15px;font-weight:700;color:#1f2937;margin-bottom:14px}
    .form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
    .form-group label{font-size:10px;font-weight:600;color:#6b7280;text-transform:uppercase}
    .form-group input,.form-group select{padding:9px 11px;border:1px solid #e5e7eb;border-radius:10px;font-family:'Poppins',sans-serif;font-size:12px;color:#374151;background:#f9fafb;outline:none;width:100%}
    .form-group input:focus,.form-group select:focus{border-color:#3b2fc9;background:#fff}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .modal-actions{display:flex;gap:8px;margin-top:14px}
    .btn-cancel{flex:1;padding:11px;border-radius:10px;border:1px solid #e5e7eb;background:#f9fafb;font-family:'Poppins',sans-serif;font-size:13px;cursor:pointer;color:#374151}
    .btn-save{flex:1;padding:11px;border-radius:10px;border:none;background:#3b2fc9;font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;color:#fff;cursor:pointer}

    /* TOAST & NAV */
    .toast{display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(34,160,90,0.92);color:#fff;padding:9px 18px;border-radius:10px;font-size:12px;font-weight:500;z-index:300;white-space:nowrap}
    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid #e5e7eb;display:flex;justify-content:space-around;padding:6px 0 10px;z-index:60}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:#9ca3af;text-decoration:none;cursor:pointer;position:relative;min-width:50px}
    .nav-item.active{color:#F47C2B}
    .nav-item svg{width:21px;height:21px}
    .nav-badge{position:absolute;top:-2px;right:4px;color:#fff;font-size:8px;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
  </style>
</head>

<script>
// ── TOKO MEDURO – Auth & Role System ──
var AUTH_KEY = 'tokomeduro_auth';

function getSession() {
  var raw = sessionStorage.getItem(AUTH_KEY);
  return raw ? JSON.parse(raw) : null;
}

function doLogout() {
  sessionStorage.removeItem(AUTH_KEY);
  window.location.href = 'index.html';
}

function requireLogin() {
  var s = getSession();
  if (!s) { window.location.href = 'index.html'; return null; }
  return s;
}

function requireOwner() {
  var s = requireLogin();
  if (!s) return null;
  if (s.role !== 'owner') {
    alert('Halaman ini hanya dapat diakses oleh Owner.');
    window.location.href = 'dashboard.html';
    return null;
  }
  return s;
}

function renderUserBadge(id) {
  var s = getSession(); if (!s) return;
  var el = document.getElementById(id); if (!el) return;
  el.innerHTML =
    '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:1px">' +
    '<span style="font-size:11px;font-weight:700;color:#fff">' + s.nama + '</span>' +
    '<span style="font-size:9px;background:rgba(255,255,255,0.25);padding:1px 7px;border-radius:99px;color:#fff;text-transform:uppercase;letter-spacing:0.5px">' + s.role + '</span>' +
    '</div>';
}

function applyRoleAccess() {
  var s = getSession(); if (!s) return;
  if (s.role === 'kasir') {
    // Sembunyikan nav owner-only
    var ownerNavs = document.querySelectorAll('[data-owner-only="true"]');
    for (var i = 0; i < ownerNavs.length; i++) { ownerNavs[i].style.display = 'none'; }
    // Sembunyikan elemen edit/hapus/restock di stok barang
    var ownerEls = document.querySelectorAll('[data-owner-el="true"]');
    for (var j = 0; j < ownerEls.length; j++) { ownerEls[j].style.display = 'none'; }
  }
}

function updateNotifBadge() {
  var raw = localStorage.getItem('tokomeduro_notif') || '[]';
  var unread = JSON.parse(raw).filter(function(n){ return !n.dibaca; });
  var badge = document.getElementById('navBadge');
  if (!badge) return;
  if (unread.length > 0) {
    badge.textContent = unread.length;
    badge.style.display = 'flex';
    badge.style.background = '#7c3aed';
  } else {
    if (typeof getProduk === 'function') {
      var kritis = getProduk().filter(function(p){ return p.stok <= 3; }).length;
      if (kritis > 0) { badge.textContent = kritis; badge.style.display = 'flex'; badge.style.background = '#ef4444'; return; }
    }
    badge.style.display = 'none';
  }
}
</script>

  { id:13, nama:'Aqua 600ml',          kategori:'Minuman', stok:24, hargaBeli:2500,  hargaJual:3500  },
  { id:14, nama:'Teh Botol 350ml',     kategori:'Minuman', stok:0,  hargaBeli:3200,  hargaJual:4000  },
  { id:15, nama:'Indomie Goreng',      kategori:'Makanan', stok:2,  hargaBeli:2800,  hargaJual:3500  },
];

// ── PRODUK ──
function getProduk() {
  var raw = localStorage.getItem(DB_KEY);
  if (!raw) { localStorage.setItem(DB_KEY, JSON.stringify(DEFAULT_PRODUK)); return DEFAULT_PRODUK; }
  return JSON.parse(raw);
}
function saveProduk(data) { localStorage.setItem(DB_KEY, JSON.stringify(data)); }
function tambahProdukBaru(p) {
  var list = getProduk();
  var newId = Math.max.apply(null, list.map(function(x){ return x.id; })) + 1;
  list.push(Object.assign({}, p, {id: newId}));
  saveProduk(list); return newId;
}
function updateProduk(id, changes) {
  var list = getProduk();
  var idx = list.findIndex(function(x){ return x.id === id; });
  if (idx > -1) { Object.assign(list[idx], changes); saveProduk(list); }
}
function hapusProdukById(id) { saveProduk(getProduk().filter(function(x){ return x.id !== id; })); }
function tambahStok(id, qty) {
  var list = getProduk();
  var p = list.find(function(x){ return x.id === id; });
  if (p) { p.stok += qty; saveProduk(list); }
}
function kurangiStok(id, qty) {
  var list = getProduk();
  var p = list.find(function(x){ return x.id === id; });
  if (p) { p.stok = Math.max(0, p.stok - qty); saveProduk(list); }
}

// ── TRANSAKSI ──
function getTransaksi() { return JSON.parse(localStorage.getItem(TRX_KEY) || '[]'); }
function tambahTransaksi(trx) {
  var list = getTransaksi(); list.unshift(trx);
  localStorage.setItem(TRX_KEY, JSON.stringify(list));
}

// ── BARANG MASUK ──
function getBarangMasuk() { return JSON.parse(localStorage.getItem(MASUK_KEY) || '[]'); }
function tambahBarangMasuk(item) {
  var list = getBarangMasuk(); list.unshift(item);
  localStorage.setItem(MASUK_KEY, JSON.stringify(list));
}

// ── BARANG KELUAR ──
function getBarangKeluar() { return JSON.parse(localStorage.getItem(KELUAR_KEY) || '[]'); }
function tambahBarangKeluar(item) {
  var list = getBarangKeluar(); list.unshift(item);
  localStorage.setItem(KELUAR_KEY, JSON.stringify(list));
}

// ── NOTIFIKASI ──
function getNotif() { return JSON.parse(localStorage.getItem(NOTIF_KEY) || '[]'); }
function tambahNotif(item) {
  var list = getNotif(); list.unshift(item);
  localStorage.setItem(NOTIF_KEY, JSON.stringify(list));
}
function tandaiNotifDibaca() {
  var list = getNotif().map(function(n){ n.dibaca = true; return n; });
  localStorage.setItem(NOTIF_KEY, JSON.stringify(list));
}
function getUnreadNotif() { return getNotif().filter(function(n){ return !n.dibaca; }); }

// ── UTILS ──
function formatRp(n) { return 'Rp ' + (n||0).toLocaleString('id-ID'); }
function getNomorTrx() {
  var n = parseInt(localStorage.getItem('tokomeduro_trx_counter') || '0') + 1;
  localStorage.setItem('tokomeduro_trx_counter', n);
  return '#TRX-' + String(n).padStart(4,'0');
}
</script>
<script>
var showAll = false, LIMIT = 15, editId = null, activeKat = '';

function setKat(el, kat) {
  document.querySelectorAll('.filter-chip').forEach(function(c){ c.classList.remove('active'); });
  el.classList.add('active'); activeKat = kat; renderTable();
}

function statusBadge(s) {
  if (s === 0) return '<span class="badge habis">Habis</span>';
  if (s <= 3)  return '<span class="badge kritis">Kritis</span>';
  return '<span class="badge aman">Aman</span>';
}

function renderTable() {
  var produk = getProduk();
  var q = document.getElementById('searchInput').value.toLowerCase();
  var filtered = produk.filter(function(p){
    return (!activeKat || p.kategori === activeKat) && (!q || p.nama.toLowerCase().indexOf(q) > -1);
  });
  var shown = (showAll || filtered.length <= LIMIT) ? filtered : filtered.slice(0, LIMIT);
  document.getElementById('moreRow').style.display = (!showAll && filtered.length > LIMIT) ? 'block' : 'none';

  var s = getSession();
  var isOwner = s && s.role === 'owner';

  document.getElementById('tableBody').innerHTML = shown.map(function(p, i) {
    var aksi = '';
    if (isOwner) {
      if (p.stok <= 3) aksi += '<button class="btn-act restock" onclick="restokProduk('+p.id+')" title="Restock"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg></button>';
      aksi += '<button class="btn-act" onclick="bukaModal('+p.id+')" title="Edit"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg></button>';
      aksi += '<button class="btn-act" onclick="hapusProduk('+p.id+')" title="Hapus"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>';
    }
    return '<tr>' +
      '<td style="color:#9ca3af;font-size:10px">'+(i+1)+'</td>' +
      '<td><div class="prod-name">'+p.nama+'</div><div style="font-size:9px;color:#9ca3af">'+p.kategori+'</div></td>' +
      '<td style="font-weight:600">'+p.stok+'</td>' +
      '<td style="font-size:10px">'+formatRp(p.hargaJual)+'</td>' +
      '<td>'+statusBadge(p.stok)+'</td>' +
      '<td><div class="action-wrap">'+aksi+'</div></td>' +
    '</tr>';
  }).join('');

  document.getElementById('statTotal').textContent = produk.length;
  document.getElementById('statAman').textContent  = produk.filter(function(p){ return p.stok > 3; }).length;
  document.getElementById('statKritis').textContent= produk.filter(function(p){ return p.stok > 0 && p.stok <= 3; }).length;
  document.getElementById('statHabis').textContent = produk.filter(function(p){ return p.stok === 0; }).length;

  renderNotifStok();
  updateNotifBadge();
}

function tampilSemua() { showAll = true; renderTable(); }
function restokProduk(id) { window.location.href = 'Pembelian.html?restock=' + id; }

function bukaModal(id) {
  editId = id;
  document.getElementById('modalTitle').textContent = id ? 'Edit Produk' : 'Tambah Produk';
  if (id) {
    var p = getProduk().find(function(x){ return x.id === id; });
    document.getElementById('fNama').value     = p.nama;
    document.getElementById('fKategori').value = p.kategori;
    document.getElementById('fStok').value     = p.stok;
    document.getElementById('fHargaBeli').value= p.hargaBeli;
    document.getElementById('fHargaJual').value= p.hargaJual;
  } else {
    ['fNama','fStok','fHargaBeli','fHargaJual'].forEach(function(x){ document.getElementById(x).value=''; });
    document.getElementById('fKategori').value = 'Rokok';
  }
  document.getElementById('modalOverlay').classList.add('open');
}

function tutupModal() { document.getElementById('modalOverlay').classList.remove('open'); editId = null; }

document.getElementById('modalOverlay').addEventListener('click', function(e){
  if (e.target === this) tutupModal();
});

function hapusProduk(id) {
  if (!confirm('Hapus produk ini?')) return;
  hapusProdukById(id); renderTable(); showToast('Produk dihapus.');
}

function simpanProduk() {
  var nama      = document.getElementById('fNama').value.trim();
  var kategori  = document.getElementById('fKategori').value;
  var stok      = parseInt(document.getElementById('fStok').value) || 0;
  var hargaBeli = parseInt(document.getElementById('fHargaBeli').value) || 0;
  var hargaJual = parseInt(document.getElementById('fHargaJual').value) || 0;
  if (!nama) { showToast('Nama wajib diisi!', false); return; }
  if (editId) { updateProduk(editId, {nama,kategori,stok,hargaBeli,hargaJual}); showToast('Produk diperbarui!'); }
  else { tambahProdukBaru({nama,kategori,stok,hargaBeli,hargaJual}); showToast('Produk ditambahkan!'); }
  tutupModal(); renderTable();
}

function showToast(msg, ok) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = (ok === false) ? 'rgba(220,60,60,0.9)' : 'rgba(34,160,90,0.92)';
  t.style.display = 'block';
  setTimeout(function(){ t.style.display = 'none'; }, 2500);
}

function loadNotifProduk() {
  var unread  = getUnreadNotif();
  var wrapper = document.getElementById('notifWrapper');
  var countEl = document.getElementById('notifCount');
  var itemsEl = document.getElementById('notifItems');
  if (unread.length === 0) { wrapper.style.display = 'none'; return; }
  wrapper.style.display = 'block';
  countEl.textContent = unread.length;
  itemsEl.innerHTML = unread.map(function(n){
    return '<div class="notif-item"><div class="notif-dot"></div><div><div class="notif-item-name">+'+n.jumlah+' pcs '+n.produk+'</div><div class="notif-item-sub">'+n.tanggal+' · '+n.waktu+' · dari Owner</div></div></div>';
  }).join('');
  // Menu "Stok" sudah dibuka = notif dianggap sudah dilihat, tandai dibaca & reset badge
  tandaiNotifDibaca();
  updateNotifBadge();
}

// Tombol ✕ / klik kartu notif Barang Masuk: tandai semua dibaca & sembunyikan kartu
function tutupNotifMasuk() {
  tandaiNotifDibaca();
  document.getElementById('notifWrapper').style.display = 'none';
  updateNotifBadge();
}

// ── NOTIF STOK MENIPIS / HABIS ──
// Hanya disembunyikan untuk sesi browser saat ini saat ditutup pakai tombol X.
// Akan muncul lagi otomatis di sesi baru, atau jika ada produk lain yang menipis/habis.
function tutupNotifStok() {
  sessionStorage.setItem('tokomeduro_notifstok_tutup', '1');
  document.getElementById('notifStokWrapper').style.display = 'none';
}

function renderNotifStok() {
  var wrapper = document.getElementById('notifStokWrapper');
  var card    = document.getElementById('notifStokCard');
  var titleEl = document.getElementById('notifStokTitle');
  var countEl = document.getElementById('notifStokCount');
  var itemsEl = document.getElementById('notifStokItems');

  var produk  = getProduk();
  var habis   = produk.filter(function(p){ return p.stok === 0; });
  var kritis  = produk.filter(function(p){ return p.stok > 0 && p.stok <= 3; });
  var bermasalah = habis.concat(kritis);

  if (bermasalah.length === 0) { wrapper.style.display = 'none'; return; }
  if (sessionStorage.getItem('tokomeduro_notifstok_tutup') === '1') { wrapper.style.display = 'none'; return; }

  // Warnai kartu merah kalau ada yang benar-benar habis, oranye kalau cuma menipis
  card.classList.toggle('habis', habis.length > 0);
  titleEl.textContent = habis.length > 0 ? 'Stok Habis & Menipis' : 'Stok Menipis';
  countEl.textContent = bermasalah.length;

  itemsEl.innerHTML = bermasalah.map(function(p){
    var isHabis = p.stok === 0;
    return '<div class="notif-item">' +
      '<div class="notif-dot" style="background:'+(isHabis ? '#fff' : '#fde68a')+'"></div>' +
      '<div>' +
        '<div class="notif-item-name">'+p.nama+'</div>' +
        '<div class="notif-item-sub">'+(isHabis ? 'Stok habis (0)' : 'Sisa stok: '+p.stok+' pcs')+' · '+p.kategori+'</div>' +
      '</div>' +
    '</div>';
  }).join('');

  wrapper.style.display = 'block';
}

// ── INIT ──
requireLogin();
renderUserBadge('userBadge');
applyRoleAccess();
updateNotifBadge();
renderTable();
loadNotifProduk();
</script>
