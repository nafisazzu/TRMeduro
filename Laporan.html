<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>Laporan – Toko Meduro</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;max-width:430px;margin:0 auto;font-family:'Poppins',sans-serif;background:#f1f3f6;min-height:100vh;padding-bottom:70px}

    .header{background:linear-gradient(135deg,#16a34a,#15803d);padding:44px 16px 14px;color:#fff;display:flex;align-items:center;justify-content:space-between}
    .header-left{display:flex;align-items:center;gap:10px}
    .header a{color:#fff;text-decoration:none;display:flex;align-items:center}
    .header a svg{width:20px;height:20px}
    .header-text h2{font-size:16px;font-weight:700}
    .header-text p{font-size:11px;opacity:0.85;margin-top:1px}

    .tab-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 12px 0}
    .tab-btn{padding:14px 10px;border:none;border-radius:13px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity 0.2s;-webkit-tap-highlight-color:transparent}
    .tab-btn svg{width:17px;height:17px}
    .tab-btn.green{background:linear-gradient(135deg,#22c55e,#16a34a)}
    .tab-btn.blue{background:linear-gradient(135deg,#3b82f6,#1d4ed8)}
    .tab-btn.dim{opacity:0.55}

    .total-card{margin:10px 12px 0;background:linear-gradient(135deg,#a044ff,#7c3aed);border-radius:13px;padding:14px 16px;color:#fff;display:flex;align-items:center;gap:12px}
    .total-card svg{width:22px;height:22px;flex-shrink:0}
    .total-label{font-size:11px;font-weight:600;opacity:0.9}
    .total-val{font-size:22px;font-weight:700;line-height:1.1}
    .total-sub{font-size:10px;opacity:0.8;margin-top:2px;display:flex;align-items:center;gap:4px}
    .total-sub svg{width:10px;height:10px}

    .content{padding:10px 12px 0}

    .chart-card{background:#fff;border-radius:13px;padding:14px;box-shadow:0 1px 5px rgba(0,0,0,0.07);margin-bottom:10px}
    .chart-card h4{font-size:12px;font-weight:700;color:#374151;margin-bottom:10px}
    .chart-wrap{position:relative;height:160px}

    .section-card{background:#fff;border-radius:13px;padding:14px;box-shadow:0 1px 5px rgba(0,0,0,0.07);margin-bottom:10px}
    .section-card h4{font-size:12px;font-weight:700;color:#1f2937;margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .top-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #f3f4f6}
    .top-item:last-child{border-bottom:none}
    .top-rank{width:24px;height:24px;border-radius:7px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#6b7280;flex-shrink:0}
    .top-rank.gold{background:#fef3c7;color:#d97706}
    .top-rank.silver{background:#f1f5f9;color:#64748b}
    .top-rank.bronze{background:#fef9ee;color:#b45309}
    .top-info{flex:1}
    .top-name{font-size:11px;font-weight:600;color:#1f2937}
    .top-val{font-size:10px;color:#6b7280}
    .top-pct{font-size:10px;font-weight:700;color:#F47C2B}

    .donut-wrap{position:relative;height:160px}
    .legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;justify-content:center}
    .legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#374151}
    .legend-dot{width:8px;height:8px;border-radius:50%}

    /* RIWAYAT */
    .riwayat-section{display:none}
    .riwayat-section.show{display:block}
    .laporan-section{display:block}
    .laporan-section.hide{display:none}

    .filter-bar{display:flex;gap:8px;margin-bottom:10px;align-items:center}
    .filter-bar select{flex:1;padding:8px 10px;border:1px solid #e5e7eb;border-radius:10px;font-family:'Poppins',sans-serif;font-size:11px;background:#fff;color:#374151;outline:none}
    .filter-bar input[type="date"]{flex:1;padding:8px 10px;border:1px solid #e5e7eb;border-radius:10px;font-family:'Poppins',sans-serif;font-size:11px;background:#fff;color:#374151;outline:none}
    .btn-export{padding:8px 12px;background:#16a34a;border:none;border-radius:10px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;color:#fff;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap}
    .btn-export svg{width:12px;height:12px}

    .table-wrap{background:#fff;border-radius:13px;overflow:hidden;box-shadow:0 1px 5px rgba(0,0,0,0.07);margin-bottom:10px}
    table{width:100%;border-collapse:collapse;font-size:11px}
    thead tr{background:#374151}
    thead th{padding:9px 8px;text-align:left;font-weight:600;color:#fff;font-size:10px;white-space:nowrap}
    tbody tr{border-bottom:1px solid #f3f4f6;cursor:pointer}
    tbody tr:last-child{border-bottom:none}
    tbody td{padding:9px 8px;color:#374151;vertical-align:middle}
    .badge-metode{display:inline-block;padding:2px 7px;border-radius:99px;font-size:9px;font-weight:600}
    .badge-metode.tunai{background:#d1fae5;color:#065f46}
    .badge-metode.transfer{background:#dbeafe;color:#1e40af}
    .badge-metode.qris{background:#ede9fe;color:#5b21b6}
    .empty-msg{text-align:center;padding:24px;color:#9ca3af;font-size:12px}

    /* MODAL DETAIL */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:flex-end;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:430px;padding:20px 16px 30px}
    .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
    .modal-head h3{font-size:14px;font-weight:700;color:#1f2937}
    .modal-close{width:28px;height:28px;border-radius:8px;border:none;background:#f3f4f6;cursor:pointer;font-size:15px;color:#6b7280}
    .detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:12px}
    .detail-row:last-child{border-bottom:none}
    .detail-label{color:#6b7280}
    .detail-val{font-weight:600;color:#1f2937}
    .detail-items{margin-top:8px}
    .detail-item{display:flex;justify-content:space-between;font-size:11px;color:#374151;padding:4px 0;border-bottom:1px solid #f9fafb}

    .toast{display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(34,160,90,0.92);color:#fff;padding:9px 18px;border-radius:10px;font-size:12px;font-weight:500;z-index:300;white-space:nowrap}

    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid #e5e7eb;display:flex;justify-content:space-around;padding:6px 0 10px;z-index:60}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:#9ca3af;text-decoration:none;cursor:pointer;position:relative;min-width:50px}
    .nav-item.active{color:#F47C2B}
    .nav-item svg{width:21px;height:21px}
    .nav-badge{position:absolute;top:-2px;right:4px;color:#fff;font-size:8px;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
  </style>
</head>

<script>
// ── TOKO MEDURO – Auth & Role System ──
var AUTH_KEY = 'tokomeduro_auth';

function getSession() {
  var raw = sessionStorage.getItem(AUTH_KEY);
  return raw ? JSON.parse(raw) : null;
}

function doLogout() {
  sessionStorage.removeItem(AUTH_KEY);
  window.location.href = 'index.html';
}

function requireLogin() {
  var s = getSession();
  if (!s) { window.location.href = 'index.html'; return null; }
  return s;
}

function requireOwner() {
  var s = requireLogin();
  if (!s) return null;
  if (s.role !== 'owner') {
    alert('Halaman ini hanya dapat diakses oleh Owner.');
    window.location.href = 'dashboard.html';
    return null;
  }
  return s;
}

function renderUserBadge(id) {
  var s = getSession(); if (!s) return;
  var el = document.getElementById(id); if (!el) return;
  el.innerHTML =
    '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:1px">' +
    '<span style="font-size:11px;font-weight:700;color:#fff">' + s.nama + '</span>' +
    '<span style="font-size:9px;background:rgba(255,255,255,0.25);padding:1px 7px;border-radius:99px;color:#fff;text-transform:uppercase;letter-spacing:0.5px">' + s.role + '</span>' +
    '</div>';
}

function applyRoleAccess() {
  var s = getSession(); if (!s) return;
  if (s.role === 'kasir') {
    // Sembunyikan nav owner-only
    var ownerNavs = document.querySelectorAll('[data-owner-only="true"]');
    for (var i = 0; i < ownerNavs.length; i++) { ownerNavs[i].style.display = 'none'; }
    // Sembunyikan elemen edit/hapus/restock di stok barang
    var ownerEls = document.querySelectorAll('[data-owner-el="true"]');
    for (var j = 0; j < ownerEls.length; j++) { ownerEls[j].style.display = 'none'; }
  }
}

function updateNotifBadge() {
  var raw = localStorage.getItem('tokomeduro_notif') || '[]';
  var unread = JSON.parse(raw).filter(function(n){ return !n.dibaca; });
  var badge = document.getElementById('navBadge');
  if (!badge) return;
  if (unread.length > 0) {
    badge.textContent = unread.length;
    badge.style.display = 'flex';
    badge.style.background = '#7c3aed';
  } else {
    if (typeof getProduk === 'function') {
      var kritis = getProduk().filter(function(p){ return p.stok <= 3; }).length;
      if (kritis > 0) { badge.textContent = kritis; badge.style.display = 'flex'; badge.style.background = '#ef4444'; return; }
    }
    badge.style.display = 'none';
  }
}
</script>

const DB_KEY     = 'tokomeduro_produk';

];

// ── PRODUK ──
function getProduk() {
  var raw = localStorage.getItem(DB_KEY);
  if (!raw) { localStorage.setItem(DB_KEY, JSON.stringify(DEFAULT_PRODUK)); return DEFAULT_PRODUK; }
  return JSON.parse(raw);
}
function saveProduk(data) { localStorage.setItem(DB_KEY, JSON.stringify(data)); }
function tambahProdukBaru(p) {
  var list = getProduk();
  var newId = Math.max.apply(null, list.map(function(x){ return x.id; })) + 1;
  list.push(Object.assign({}, p, {id: newId}));
  saveProduk(list); return newId;
}
function updateProduk(id, changes) {
  var list = getProduk();
  var idx = list.findIndex(function(x){ return x.id === id; });
  if (idx > -1) { Object.assign(list[idx], changes); saveProduk(list); }
}
function hapusProdukById(id) { saveProduk(getProduk().filter(function(x){ return x.id !== id; })); }
function tambahStok(id, qty) {
  var list = getProduk();
  var p = list.find(function(x){ return x.id === id; });
  if (p) { p.stok += qty; saveProduk(list); }
}
function kurangiStok(id, qty) {
  var list = getProduk();
  var p = list.find(function(x){ return x.id === id; });
  if (p) { p.stok = Math.max(0, p.stok - qty); saveProduk(list); }
}

// ── TRANSAKSI ──
function getTransaksi() { return JSON.parse(localStorage.getItem(TRX_KEY) || '[]'); }
function tambahTransaksi(trx) {
  var list = getTransaksi(); list.unshift(trx);
  localStorage.setItem(TRX_KEY, JSON.stringify(list));
}

// ── BARANG MASUK ──
function getBarangMasuk() { return JSON.parse(localStorage.getItem(MASUK_KEY) || '[]'); }
function tambahBarangMasuk(item) {
  var list = getBarangMasuk(); list.unshift(item);
  localStorage.setItem(MASUK_KEY, JSON.stringify(list));
}

// ── BARANG KELUAR ──
function getBarangKeluar() { return JSON.parse(localStorage.getItem(KELUAR_KEY) || '[]'); }
function tambahBarangKeluar(item) {
  var list = getBarangKeluar(); list.unshift(item);
  localStorage.setItem(KELUAR_KEY, JSON.stringify(list));
}

// ── NOTIFIKASI ──
function getNotif() { return JSON.parse(localStorage.getItem(NOTIF_KEY) || '[]'); }
function tambahNotif(item) {
  var list = getNotif(); list.unshift(item);
  localStorage.setItem(NOTIF_KEY, JSON.stringify(list));
}
function tandaiNotifDibaca() {
  var list = getNotif().map(function(n){ n.dibaca = true; return n; });
  localStorage.setItem(NOTIF_KEY, JSON.stringify(list));
}
function getUnreadNotif() { return getNotif().filter(function(n){ return !n.dibaca; }); }

// ── UTILS ──
function formatRp(n) { return 'Rp ' + (n||0).toLocaleString('id-ID'); }
function getNomorTrx() {
  var n = parseInt(localStorage.getItem('tokomeduro_trx_counter') || '0') + 1;
  localStorage.setItem('tokomeduro_trx_counter', n);
  return '#TRX-' + String(n).padStart(4,'0');
}
</script>
<script>
var barChartInst = null;
var donutChartInst = null;

function switchTab(tab) {
  var isLap = tab === 'laporan';
  document.getElementById('laporanSection').className = 'laporan-section content' + (isLap ? '' : ' hide');
  document.getElementById('riwayatSection').className = 'riwayat-section content' + (isLap ? '' : ' show');
  document.getElementById('tabLaporan').className = 'tab-btn green' + (isLap ? '' : ' dim');
  document.getElementById('tabRiwayat').className = 'tab-btn blue' + (isLap ? ' dim' : '');
  if (!isLap) renderRiwayat();
}

function renderRiwayat() {
  var trxList = getTransaksi();
  var metode  = document.getElementById('filterMetode').value;
  var tgl     = document.getElementById('filterTanggal').value;

  var filtered = trxList.filter(function(t) {
    return (!metode || t.metode === metode) && (!tgl || t.tanggal === tgl);
  });

  var tbody = document.getElementById('riwayatBody');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty-msg">Belum ada transaksi</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(function(t, i) {
    var badgeClass = (t.metode||'').toLowerCase();
    return '<tr onclick="bukaDetail(' + i + ')">' +
      '<td style="color:#9ca3af">' + (i+1) + '</td>' +
      '<td style="font-size:10px;color:#6b7280">' + (t.tanggal||'-') + '</td>' +
      '<td style="font-weight:600;font-size:11px">' + (t.noTrx||'-') + '</td>' +
      '<td style="font-weight:700;color:#F47C2B;font-size:11px">' + formatRp(t.total) + '</td>' +
      '<td><span class="badge-metode ' + badgeClass + '">' + (t.metode||'-') + '</span></td>' +
    '</tr>';
  }).join('');

  // simpan filtered ke window untuk modal
  window._filteredTrx = filtered;
}

function bukaDetail(idx) {
  var t = window._filteredTrx[idx];
  if (!t) return;
  var itemsHtml = '';
  if (t.items && t.items.length) {
    itemsHtml = '<div class="detail-items">' +
      t.items.map(function(i){
        return '<div class="detail-item"><span>'+i.nama+' x'+i.qty+'</span><span>'+formatRp(i.subtotal)+'</span></div>';
      }).join('') + '</div>';
  }
  document.getElementById('modalContent').innerHTML =
    '<div class="detail-row"><span class="detail-label">No Transaksi</span><span class="detail-val">'+(t.noTrx||'-')+'</span></div>' +
    '<div class="detail-row"><span class="detail-label">Tanggal</span><span class="detail-val">'+(t.tglStr||t.tanggal||'-')+'</span></div>' +
    '<div class="detail-row"><span class="detail-label">Waktu</span><span class="detail-val">'+(t.jamStr||'-')+'</span></div>' +
    '<div class="detail-row"><span class="detail-label">Total</span><span class="detail-val" style="color:#F47C2B">'+formatRp(t.total)+'</span></div>' +
    '<div class="detail-row"><span class="detail-label">Bayar</span><span class="detail-val">'+formatRp(t.bayar)+'</span></div>' +
    '<div class="detail-row"><span class="detail-label">Kembalian</span><span class="detail-val">'+formatRp(t.kembalian)+'</span></div>' +
    '<div class="detail-row"><span class="detail-label">Metode</span><span class="detail-val">'+(t.metode||'-')+'</span></div>' +
    itemsHtml;
  document.getElementById('modalOverlay').classList.add('open');
}

function tutupModal() { document.getElementById('modalOverlay').classList.remove('open'); }
document.getElementById('modalOverlay').addEventListener('click', function(e){ if(e.target===this) tutupModal(); });

function exportCSV() {
  var trxList = getTransaksi();
  var rows = [['No','Tanggal','No Trx','Produk','Qty','Subtotal','Total','Metode']];
  trxList.forEach(function(t, i) {
    if (t.items) {
      t.items.forEach(function(item) {
        rows.push([i+1, t.tanggal||'-', t.noTrx||'-', item.nama, item.qty, item.subtotal, t.total, t.metode||'-']);
      });
    } else {
      rows.push([i+1, t.tanggal||'-', t.noTrx||'-', '-', '-', '-', t.total, t.metode||'-']);
    }
  });
  var csv  = rows.map(function(r){ return r.join(','); }).join('\n');
  var blob = new Blob([csv], {type:'text/csv'});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url; a.download = 'laporan-transaksi.csv'; a.click();
  showToast('CSV berhasil diunduh!');
}

function showToast(msg, ok) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = (ok===false) ? 'rgba(220,60,60,0.9)' : 'rgba(34,160,90,0.92)';
  t.style.display = 'block';
  setTimeout(function(){ t.style.display='none'; }, 2500);
}

function initCharts() {
  var trxList = getTransaksi();
  var total   = trxList.reduce(function(s,t){ return s+(t.total||0); }, 0);
  document.getElementById('totalPendapatan').textContent = formatRp(total);

  // Bar chart 7 hari
  var days = [], vals = [];
  for (var i = 6; i >= 0; i--) {
    var d = new Date(); d.setDate(d.getDate()-i);
    var key = d.toISOString().split('T')[0];
    days.push(key.slice(5));
    vals.push(trxList.filter(function(t){ return t.tanggal===key; }).reduce(function(s,t){ return s+(t.total||0); },0));
  }
  if (barChartInst) barChartInst.destroy();
  barChartInst = new Chart(document.getElementById('barChart').getContext('2d'), {
    type:'bar',
    data:{labels:days,datasets:[{data:vals,backgroundColor:'#F47C2B',borderRadius:5}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{grid:{display:false},ticks:{font:{family:'Poppins',size:9}}},
              y:{beginAtZero:true,ticks:{font:{family:'Poppins',size:9},callback:function(v){return 'Rp'+(v/1000)+'k';}}}}}
  });

  // Top 5 produk
  var produkMap = {};
  trxList.forEach(function(t){
    if(t.items) t.items.forEach(function(i){ produkMap[i.nama]=(produkMap[i.nama]||0)+i.subtotal; });
  });
  var top5 = Object.entries(produkMap).sort(function(a,b){ return b[1]-a[1]; }).slice(0,5);
  var maxVal = top5[0] ? top5[0][1] : 1;
  var rankClass = ['gold','silver','bronze','',''];
  document.getElementById('top5Container').innerHTML = top5.length > 0
    ? top5.map(function(e,i){
        return '<div class="top-item">' +
          '<div class="top-rank '+rankClass[i]+'">'+(i+1)+'</div>' +
          '<div class="top-info"><div class="top-name">'+e[0]+'</div><div class="top-val">'+formatRp(e[1])+'</div></div>' +
          '<div class="top-pct">'+Math.round(e[1]/maxVal*100)+'%</div>' +
        '</div>';
      }).join('')
    : '<div class="empty-msg">Belum ada data transaksi</div>';

  // Donut per kategori
  var katMap = {Rokok:0,Minuman:0,Makanan:0,Sembako:0};
  var produk = getProduk();
  trxList.forEach(function(t){
    if(t.items) t.items.forEach(function(i){
      var p = produk.find(function(x){ return x.nama===i.nama; });
      if(p && katMap[p.kategori]!==undefined) katMap[p.kategori]+=i.subtotal;
    });
  });
  if (donutChartInst) donutChartInst.destroy();
  donutChartInst = new Chart(document.getElementById('donutChart').getContext('2d'), {
    type:'doughnut',
    data:{labels:Object.keys(katMap),datasets:[{data:Object.values(katMap),backgroundColor:['#8b5cf6','#3b82f6','#22c55e','#f59e0b'],borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
      tooltip:{callbacks:{label:function(ctx){ return ' '+formatRp(ctx.parsed);}}}},cutout:'65%'}
  });
}

// ── INIT ──
requireOwner();
renderUserBadge('userBadge');
applyRoleAccess();
updateNotifBadge();
switchTab('laporan');
initCharts();
</script>
</body>
</html>
