<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>Manajemen Pengguna – Toko Meduro</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;max-width:430px;margin:0 auto;font-family:'Poppins',sans-serif;background:#f1f3f6;min-height:100vh;padding-bottom:70px}

    /* HEADER */
    .header{background:linear-gradient(135deg,#7c3aed,#6d28d9);padding:44px 16px 14px;color:#fff;display:flex;align-items:center;justify-content:space-between}
    .header-left{display:flex;align-items:center;gap:10px}
    .header a{color:#fff;text-decoration:none;display:flex;align-items:center}
    .header a svg{width:20px;height:20px}
    .header-text h2{font-size:16px;font-weight:700}
    .header-text p{font-size:11px;opacity:0.85;margin-top:1px}

    /* CONTENT */
    .content{padding:12px}
    .card{background:#fff;border-radius:14px;padding:14px;box-shadow:0 1px 6px rgba(0,0,0,0.07);margin-bottom:12px}
    .card h3{font-size:13px;font-weight:700;color:#1f2937;margin-bottom:12px}

    /* FORM */
    .form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
    .form-group label{font-size:10px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.5px}
    .form-group input,.form-group select{padding:9px 11px;border:1px solid #e5e7eb;border-radius:10px;font-family:'Poppins',sans-serif;font-size:12px;color:#374151;background:#f9fafb;outline:none;width:100%}
    .form-group input:focus,.form-group select:focus{border-color:#7c3aed;background:#fff}
    .form-group input::placeholder{color:#9ca3af}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}

    /* BUTTONS */
    .btn-simpan{width:100%;padding:12px;background:#7c3aed;border:none;border-radius:12px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:4px;-webkit-tap-highlight-color:transparent}
    .btn-simpan svg{width:14px;height:14px}
    .btn-simpan:active{opacity:0.85}

    /* USER LIST */
    .section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .section-head h3{font-size:13px;font-weight:700;color:#1f2937}
    .section-head span{font-size:11px;color:#6b7280}

    .user-list{display:flex;flex-direction:column;gap:8px}
    .user-card{background:#fff;border-radius:12px;padding:12px 14px;box-shadow:0 1px 5px rgba(0,0,0,0.07);display:flex;align-items:center;gap:12px}
    .user-avatar{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;font-weight:700;color:#fff}
    .user-avatar.owner{background:linear-gradient(135deg,#7c3aed,#6d28d9)}
    .user-avatar.kasir{background:linear-gradient(135deg,#F47C2B,#e06a1a)}
    .user-info{flex:1}
    .user-name{font-size:13px;font-weight:600;color:#1f2937}
    .user-meta{font-size:10px;color:#6b7280;margin-top:2px;display:flex;align-items:center;gap:6px}
    .role-badge{display:inline-block;padding:1px 7px;border-radius:99px;font-size:9px;font-weight:700;text-transform:uppercase}
    .role-badge.owner{background:#ede9fe;color:#6d28d9}
    .role-badge.kasir{background:#fff7ed;color:#c2410c}
    .status-badge{display:inline-block;padding:1px 7px;border-radius:99px;font-size:9px;font-weight:600}
    .status-badge.aktif{background:#d1fae5;color:#065f46}
    .status-badge.nonaktif{background:#fee2e2;color:#991b1b}
    .user-actions{display:flex;gap:6px;flex-shrink:0}
    .btn-act{width:30px;height:30px;border-radius:8px;border:1px solid #e5e7eb;background:#f9fafb;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .btn-act svg{width:13px;height:13px}
    .btn-act.edit{color:#7c3aed;border-color:#ede9fe;background:#faf5ff}
    .btn-act.toggle-on{color:#16a34a;border-color:#d1fae5;background:#f0fdf4}
    .btn-act.toggle-off{color:#dc2626;border-color:#fee2e2;background:#fff5f5}
    .btn-act.hapus{color:#dc2626;border-color:#fee2e2;background:#fff5f5}

    /* MODAL */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:flex-end;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:430px;padding:20px 16px 30px}
    .modal h3{font-size:15px;font-weight:700;color:#1f2937;margin-bottom:14px}
    .modal-actions{display:flex;gap:8px;margin-top:14px}
    .btn-cancel{flex:1;padding:11px;border-radius:10px;border:1px solid #e5e7eb;background:#f9fafb;font-family:'Poppins',sans-serif;font-size:13px;cursor:pointer;color:#374151}
    .btn-save{flex:1;padding:11px;border-radius:10px;border:none;background:#7c3aed;font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;color:#fff;cursor:pointer}

    /* CONFIRM DIALOG */
    .confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:center;justify-content:center;padding:20px}
    .confirm-overlay.open{display:flex}
    .confirm-box{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:320px;text-align:center}
    .confirm-icon{width:48px;height:48px;border-radius:14px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center}
    .confirm-icon svg{width:24px;height:24px}
    .confirm-title{font-size:15px;font-weight:700;color:#1f2937;margin-bottom:6px}
    .confirm-msg{font-size:12px;color:#6b7280;line-height:1.5;margin-bottom:16px}
    .confirm-actions{display:flex;gap:8px}
    .confirm-cancel{flex:1;padding:10px;border-radius:10px;border:1px solid #e5e7eb;background:#f9fafb;font-family:'Poppins',sans-serif;font-size:13px;cursor:pointer;color:#374151}
    .confirm-ok{flex:1;padding:10px;border-radius:10px;border:none;font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;color:#fff;cursor:pointer}

    /* EMPTY */
    .empty-state{text-align:center;padding:24px;color:#9ca3af;font-size:12px}
    .empty-state svg{width:40px;height:40px;margin:0 auto 8px;display:block;opacity:0.3}

    /* TOAST */
    .toast{display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);color:#fff;padding:9px 18px;border-radius:10px;font-size:12px;font-weight:500;z-index:300;white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,0.2)}

    /* NAV */
    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid #e5e7eb;display:flex;justify-content:space-around;padding:6px 0 10px;z-index:60}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:#9ca3af;text-decoration:none;cursor:pointer;position:relative;min-width:50px}
    .nav-item.active{color:#F47C2B}
    .nav-item svg{width:21px;height:21px}
    .nav-badge{position:absolute;top:-2px;right:4px;color:#fff;font-size:8px;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
  </style>
</head>

<script>
// ── TOKO MEDURO – Auth & Role System ──
var AUTH_KEY = 'tokomeduro_auth';

function getSession() {
  var raw = sessionStorage.getItem(AUTH_KEY);
  return raw ? JSON.parse(raw) : null;
}

function doLogout() {
  sessionStorage.removeItem(AUTH_KEY);
  window.location.href = 'index.html';
}

function requireLogin() {
  var s = getSession();
  if (!s) { window.location.href = 'index.html'; return null; }
  return s;
}

function requireOwner() {
  var s = requireLogin();
  if (!s) return null;
  if (s.role !== 'owner') {
    alert('Halaman ini hanya dapat diakses oleh Owner.');
    window.location.href = 'dashboard.html';
    return null;
  }
  return s;
}

function renderUserBadge(id) {
  var s = getSession(); if (!s) return;
  var el = document.getElementById(id); if (!el) return;
  el.innerHTML =
    '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:1px">' +
    '<span style="font-size:11px;font-weight:700;color:#fff">' + s.nama + '</span>' +
    '<span style="font-size:9px;background:rgba(255,255,255,0.25);padding:1px 7px;border-radius:99px;color:#fff;text-transform:uppercase;letter-spacing:0.5px">' + s.role + '</span>' +
    '</div>';
}

function applyRoleAccess() {
  var s = getSession(); if (!s) return;
  if (s.role === 'kasir') {
    // Sembunyikan nav owner-only
    var ownerNavs = document.querySelectorAll('[data-owner-only="true"]');
    for (var i = 0; i < ownerNavs.length; i++) { ownerNavs[i].style.display = 'none'; }
    // Sembunyikan elemen edit/hapus/restock di stok barang
    var ownerEls = document.querySelectorAll('[data-owner-el="true"]');
    for (var j = 0; j < ownerEls.length; j++) { ownerEls[j].style.display = 'none'; }
  }
}

function updateNotifBadge() {
  var raw = localStorage.getItem('tokomeduro_notif') || '[]';
  var unread = JSON.parse(raw).filter(function(n){ return !n.dibaca; });
  var badge = document.getElementById('navBadge');
  if (!badge) return;
  if (unread.length > 0) {
    badge.textContent = unread.length;
    badge.style.display = 'flex';
    badge.style.background = '#7c3aed';
  } else {
    if (typeof getProduk === 'function') {
      var kritis = getProduk().filter(function(p){ return p.stok <= 3; }).length;
      if (kritis > 0) { badge.textContent = kritis; badge.style.display = 'flex'; badge.style.background = '#ef4444'; return; }
    }
    badge.style.display = 'none';
  }
}
</script>
<script>
// ── TOKO MEDURO – Shared Data Store (localStorage) ──

const DB_KEY     = 'tokomeduro_produk';
const TRX_KEY    = 'tokomeduro_transaksi';
const MASUK_KEY  = 'tokomeduro_barangmasuk';
const KELUAR_KEY = 'tokomeduro_barangkeluar';
const NOTIF_KEY  = 'tokomeduro_notif';

const DEFAULT_PRODUK = [
  { id:1,  nama:'Kansas 20',           kategori:'Rokok',   stok:3,  hargaBeli:16500, hargaJual:19000 },
  { id:2,  nama:'HS Kretek 12',        kategori:'Rokok',   stok:5,  hargaBeli:8750,  hargaJual:10000 },
  { id:3,  nama:'EspresoGold',         kategori:'Rokok',   stok:2,  hargaBeli:17700, hargaJual:20000 },
  { id:4,  nama:'Marlboro F Black 16', kategori:'Rokok',   stok:3,  hargaBeli:30601, hargaJual:35000 },
  { id:5,  nama:'Marlboro F Black 12', kategori:'Rokok',   stok:10, hargaBeli:23531, hargaJual:27000 },
  { id:6,  nama:'Mild 16',             kategori:'Rokok',   stok:6,  hargaBeli:35074, hargaJual:40000 },
  { id:7,  nama:'Inter FIM',           kategori:'Rokok',   stok:4,  hargaBeli:25900, hargaJual:29000 },
  { id:8,  nama:'Surya 16 Merah FSM',  kategori:'Rokok',   stok:3,  hargaBeli:34900, hargaJual:39000 },
  { id:9,  nama:'Surya 12',            kategori:'Rokok',   stok:10, hargaBeli:25850, hargaJual:29000 },
  { id:10, nama:'Gajah Baru 16',       kategori:'Rokok',   stok:10, hargaBeli:20650, hargaJual:23000 },
  { id:11, nama:'GB Premium',          kategori:'Rokok',   stok:6,  hargaBeli:16700, hargaJual:19000 },
  { id:12, nama:'Dunhil Hitam 12',     kategori:'Rokok',   stok:5,  hargaBeli:21400, hargaJual:24500 },
  { id:13, nama:'Aqua 600ml',          kategori:'Minuman', stok:24, hargaBeli:2500,  hargaJual:3500  },
  { id:14, nama:'Teh Botol 350ml',     kategori:'Minuman', stok:0,  hargaBeli:3200,  hargaJual:4000  },
  { id:15, nama:'Indomie Goreng',      kategori:'Makanan', stok:2,  hargaBeli:2800,  hargaJual:3500  },
];

// ── PRODUK ──
function getProduk() {
  var raw = localStorage.getItem(DB_KEY);
  if (!raw) { localStorage.setItem(DB_KEY, JSON.stringify(DEFAULT_PRODUK)); return DEFAULT_PRODUK; }
  return JSON.parse(raw);
}
function saveProduk(data) { localStorage.setItem(DB_KEY, JSON.stringify(data)); }
function tambahProdukBaru(p) {
  var list = getProduk();
  var newId = Math.max.apply(null, list.map(function(x){ return x.id; })) + 1;
  list.push(Object.assign({}, p, {id: newId}));
  saveProduk(list); return newId;
}
function updateProduk(id, changes) {
  var list = getProduk();
  var idx = list.findIndex(function(x){ return x.id === id; });
  if (idx > -1) { Object.assign(list[idx], changes); saveProduk(list); }
}
function hapusProdukById(id) { saveProduk(getProduk().filter(function(x){ return x.id !== id; })); }
function tambahStok(id, qty) {
  var list = getProduk();
  var p = list.find(function(x){ return x.id === id; });
  if (p) { p.stok += qty; saveProduk(list); }
}
function kurangiStok(id, qty) {
  var list = getProduk();
  var p = list.find(function(x){ return x.id === id; });
  if (p) { p.stok = Math.max(0, p.stok - qty); saveProduk(list); }
}

// ── TRANSAKSI ──
function getTransaksi() { return JSON.parse(localStorage.getItem(TRX_KEY) || '[]'); }
function tambahTransaksi(trx) {
  var list = getTransaksi(); list.unshift(trx);
  localStorage.setItem(TRX_KEY, JSON.stringify(list));
}

// ── BARANG MASUK ──
function getBarangMasuk() { return JSON.parse(localStorage.getItem(MASUK_KEY) || '[]'); }
function tambahBarangMasuk(item) {
  var list = getBarangMasuk(); list.unshift(item);
  localStorage.setItem(MASUK_KEY, JSON.stringify(list));
}

// ── BARANG KELUAR ──
function getBarangKeluar() { return JSON.parse(localStorage.getItem(KELUAR_KEY) || '[]'); }
function tambahBarangKeluar(item) {
  var list = getBarangKeluar(); list.unshift(item);
  localStorage.setItem(KELUAR_KEY, JSON.stringify(list));
}

// ── NOTIFIKASI ──
function getNotif() { return JSON.parse(localStorage.getItem(NOTIF_KEY) || '[]'); }
function tambahNotif(item) {
  var list = getNotif(); list.unshift(item);
  localStorage.setItem(NOTIF_KEY, JSON.stringify(list));
}
function tandaiNotifDibaca() {
  var list = getNotif().map(function(n){ n.dibaca = true; return n; });
  localStorage.setItem(NOTIF_KEY, JSON.stringify(list));
}
function getUnreadNotif() { return getNotif().filter(function(n){ return !n.dibaca; }); }

// ── UTILS ──
function formatRp(n) { return 'Rp ' + (n||0).toLocaleString('id-ID'); }
function getNomorTrx() {
  var n = parseInt(localStorage.getItem('tokomeduro_trx_counter') || '0') + 1;
  localStorage.setItem('tokomeduro_trx_counter', n);
  return '#TRX-' + String(n).padStart(4,'0');
}
</script>
<script>
var USER_KEY = 'tokomeduro_users';

// Default users (owner selalu ada, tidak bisa dihapus)
var DEFAULT_USERS = [
  { id:1, nama:'Pemilik Toko', username:'owner', password:'admin123', role:'owner', status:'aktif' },
  { id:2, nama:'Kasir',        username:'kasir', password:'1234',     role:'kasir', status:'aktif' },
];

function getUsers() {
  var raw = localStorage.getItem(USER_KEY);
  if (!raw) { localStorage.setItem(USER_KEY, JSON.stringify(DEFAULT_USERS)); return DEFAULT_USERS; }
  return JSON.parse(raw);
}
function saveUsers(list) { localStorage.setItem(USER_KEY, JSON.stringify(list)); }

function renderUsers() {
  var list = getUsers();
  var el   = document.getElementById('userList');
  document.getElementById('userCount').textContent = list.length + ' pengguna';

  if (list.length === 0) {
    el.innerHTML = '<div class="empty-state"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>Belum ada pengguna</div>';
    return;
  }

  el.innerHTML = list.map(function(u) {
    var isOwner = u.role === 'owner';
    var initial = u.nama.charAt(0).toUpperCase();
    var editBtn = !isOwner
      ? '<button class="btn-act edit" onclick="bukaEdit(' + u.id + ')" title="Edit"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg></button>'
      : '';
    var toggleBtn = !isOwner
      ? (u.status === 'aktif'
          ? '<button class="btn-act toggle-off" onclick="toggleStatus(' + u.id + ')" title="Nonaktifkan"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg></button>'
          : '<button class="btn-act toggle-on" onclick="toggleStatus(' + u.id + ')" title="Aktifkan"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></button>')
      : '';
    var hapusBtn = !isOwner
      ? '<button class="btn-act hapus" onclick="hapusUser(' + u.id + ')" title="Hapus"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>'
      : '';

    return '<div class="user-card">' +
      '<div class="user-avatar ' + u.role + '">' + initial + '</div>' +
      '<div class="user-info">' +
        '<div class="user-name">' + u.nama + '</div>' +
        '<div class="user-meta">' +
          '<span class="role-badge ' + u.role + '">' + u.role + '</span>' +
          '<span>@' + u.username + '</span>' +
          '·' +
          '<span class="status-badge ' + u.status + '">' + u.status + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="user-actions">' + editBtn + toggleBtn + hapusBtn + '</div>' +
    '</div>';
  }).join('');
}

function tambahKasir() {
  var nama     = document.getElementById('fNama').value.trim();
  var username = document.getElementById('fUsername').value.trim();
  var password = document.getElementById('fPassword').value;
  if (!nama)     { showToast('Nama wajib diisi!', false); return; }
  if (!username) { showToast('Username wajib diisi!', false); return; }
  if (!password) { showToast('Password wajib diisi!', false); return; }

  var list = getUsers();
  var exists = list.find(function(u){ return u.username === username; });
  if (exists) { showToast('Username sudah digunakan!', false); return; }

  var newId = Math.max.apply(null, list.map(function(u){ return u.id; })) + 1;
  list.push({ id:newId, nama:nama, username:username, password:password, role:'kasir', status:'aktif' });
  saveUsers(list);

  document.getElementById('fNama').value = '';
  document.getElementById('fUsername').value = '';
  document.getElementById('fPassword').value = '';
  renderUsers();
  showToast('Akun kasir ' + nama + ' berhasil dibuat! ✅');
}

function bukaEdit(id) {
  var u = getUsers().find(function(x){ return x.id === id; });
  if (!u) return;
  document.getElementById('editId').value       = id;
  document.getElementById('editNama').value     = u.nama;
  document.getElementById('editUsername').value = u.username;
  document.getElementById('editPassword').value = '';
  document.getElementById('modalEdit').classList.add('open');
}

function tutupModal() { document.getElementById('modalEdit').classList.remove('open'); }

document.getElementById('modalEdit').addEventListener('click', function(e){
  if (e.target === this) tutupModal();
});

function simpanEdit() {
  var id       = parseInt(document.getElementById('editId').value);
  var nama     = document.getElementById('editNama').value.trim();
  var username = document.getElementById('editUsername').value.trim();
  var password = document.getElementById('editPassword').value;
  if (!nama)     { showToast('Nama wajib diisi!', false); return; }
  if (!username) { showToast('Username wajib diisi!', false); return; }

  var list = getUsers();
  // Cek username duplikat (kecuali dirinya sendiri)
  var dup = list.find(function(u){ return u.username === username && u.id !== id; });
  if (dup) { showToast('Username sudah digunakan!', false); return; }

  var idx = list.findIndex(function(u){ return u.id === id; });
  if (idx > -1) {
    list[idx].nama     = nama;
    list[idx].username = username;
    if (password) list[idx].password = password;
    saveUsers(list);
  }
  tutupModal();
  renderUsers();
  showToast('Akun berhasil diperbarui! ✅');
}

function toggleStatus(id) {
  var list = getUsers();
  var u    = list.find(function(x){ return x.id === id; });
  if (!u) return;
  var isAktif = u.status === 'aktif';
  showConfirm(
    isAktif ? '⚠️' : '✅',
    isAktif ? '#fef3c7' : '#d1fae5',
    isAktif ? '#d97706' : '#16a34a',
    isAktif ? 'Nonaktifkan Kasir?' : 'Aktifkan Kasir?',
    isAktif
      ? 'Akun @' + u.username + ' akan dinonaktifkan. Kasir tidak dapat login sebelum diaktifkan kembali.'
      : 'Akun @' + u.username + ' akan diaktifkan kembali.',
    isAktif ? '#ef4444' : '#16a34a',
    function() {
      u.status = isAktif ? 'nonaktif' : 'aktif';
      saveUsers(list);
      renderUsers();
      showToast('Status akun @' + u.username + ' diubah ke ' + u.status + '!');
    }
  );
}

function hapusUser(id) {
  var list = getUsers();
  var u    = list.find(function(x){ return x.id === id; });
  if (!u) return;
  showConfirm(
    '🗑️', '#fee2e2', '#dc2626',
    'Hapus Akun?',
    'Akun @' + u.username + ' akan dihapus permanen. Riwayat transaksi tidak akan terhapus.',
    '#ef4444',
    function() {
      saveUsers(list.filter(function(x){ return x.id !== id; }));
      renderUsers();
      showToast('Akun @' + u.username + ' dihapus!');
    }
  );
}

// ── CONFIRM DIALOG ──
var confirmCallback = null;
function showConfirm(icon, iconBg, iconColor, title, msg, okColor, cb) {
  document.getElementById('confirmIcon').innerHTML =
    '<div style="width:48px;height:48px;border-radius:14px;background:' + iconBg + ';display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto">' + icon + '</div>';
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').textContent   = msg;
  document.getElementById('confirmOk').style.background = okColor;
  confirmCallback = cb;
  document.getElementById('confirmOverlay').classList.add('open');
}
function tutupConfirm() { document.getElementById('confirmOverlay').classList.remove('open'); confirmCallback = null; }
document.getElementById('confirmOk').addEventListener('click', function(){
  if (confirmCallback) confirmCallback();
  tutupConfirm();
});
document.getElementById('confirmOverlay').addEventListener('click', function(e){
  if (e.target === this) tutupConfirm();
});

function showToast(msg, ok) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = (ok===false) ? 'rgba(220,60,60,0.95)' : 'rgba(34,160,90,0.92)';
  t.style.display = 'block';
  setTimeout(function(){ t.style.display='none'; }, 2500);
}
