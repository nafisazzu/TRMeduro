<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>Barang Masuk – Toko Meduro</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;max-width:430px;margin:0 auto;font-family:'Poppins',sans-serif;background:#f1f3f6;min-height:100vh;padding-bottom:70px}
    .header{background:linear-gradient(135deg,#22c55e,#16a34a);padding:44px 16px 14px;color:#fff;display:flex;align-items:center;justify-content:space-between}
    .header-left{display:flex;align-items:center;gap:10px}
    .header a{color:#fff;text-decoration:none;display:flex;align-items:center}
    .header a svg{width:20px;height:20px}
    .header-text h2{font-size:16px;font-weight:700}
    .header-text p{font-size:11px;opacity:0.85;margin-top:1px}
    .content{padding:12px}
    .card{background:#fff;border-radius:14px;padding:14px;box-shadow:0 1px 6px rgba(0,0,0,0.07);margin-bottom:12px}
    .card h3{font-size:13px;font-weight:700;color:#1f2937;margin-bottom:12px}
    .form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
    .form-group label{font-size:10px;font-weight:600;color:#6b7280;text-transform:uppercase}
    .form-group input,.form-group select{padding:9px 11px;border:1px solid #e5e7eb;border-radius:10px;font-family:'Poppins',sans-serif;font-size:12px;color:#374151;background:#f9fafb;outline:none;width:100%}
    .form-group input:focus,.form-group select:focus{border-color:#16a34a;background:#fff}
    .form-group input::placeholder{color:#9ca3af}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .btn-simpan{width:100%;padding:12px;background:#16a34a;border:none;border-radius:12px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:4px}
    .btn-simpan svg{width:14px;height:14px}
    .section-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
    .section-head h3{font-size:13px;font-weight:700;color:#1f2937}
    .section-head svg{width:18px;height:18px;color:#F47C2B}
    .table-wrap{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,0.07)}
    table{width:100%;border-collapse:collapse;font-size:11px}
    thead tr{background:#374151}
    thead th{padding:9px 8px;text-align:left;font-weight:600;color:#fff;font-size:10px;white-space:nowrap}
    tbody tr{border-bottom:1px solid #f3f4f6}
    tbody tr:last-child{border-bottom:none}
    tbody td{padding:9px 8px;color:#374151;vertical-align:middle}
    .prod-name{font-weight:600;color:#1f2937}
    .qty-badge{display:inline-flex;padding:2px 7px;background:#d1fae5;color:#065f46;font-size:10px;font-weight:700;border-radius:99px}
    .more-row{text-align:center;padding:10px;font-size:12px;color:#6b7280;cursor:pointer;background:#f9fafb;border-top:1px solid #f3f4f6}
    .toast{display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(34,160,90,0.92);color:#fff;padding:9px 18px;border-radius:10px;font-size:12px;font-weight:500;z-index:300;white-space:nowrap}
    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid #e5e7eb;display:flex;justify-content:space-around;padding:6px 0 10px;z-index:60}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:#9ca3af;text-decoration:none;cursor:pointer;position:relative;min-width:50px}
    .nav-item.active{color:#F47C2B}
    .nav-item svg{width:21px;height:21px}
    .nav-badge{position:absolute;top:-2px;right:4px;color:#fff;font-size:8px;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
  </style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <a href="dashboard.html"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg></a>
    <div class="header-text"><h2>Barang Masuk</h2><p>Catat Penerimaan dari Supplier</p></div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div id="userBadge"></div>
    <div style="width:32px;height:32px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;color:#fff"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
    </div>
  </div>
</div>
<div class="content">
  <div class="card">
    <h3>Catat Penerimaan Barang</h3>
    <div class="form-group"><label>Nama Barang</label><select id="fProduk"><option value="">Pilih Produk</option></select></div>
    <div class="form-group"><label>Nama Supplier</label><input id="fSupplier" type="text" placeholder="Nama Supplier / Distributor"/></div>
    <div class="form-row">
      <div class="form-group"><label>Jumlah (pcs)</label><input id="fJumlah" type="number" placeholder="0" min="1"/></div>
      <div class="form-group"><label>Harga Beli (Rp)</label><input id="fHarga" type="number" placeholder="0" min="0"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Tanggal</label><input id="fTanggal" type="date"/></div>

    </div>
    <button class="btn-simpan" onclick="simpanBarang()">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
      Simpan Barang Masuk
    </button>
  </div>
  <div class="section-head">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
    <h3>Riwayat Barang Masuk</h3>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Tanggal</th><th>Produk</th><th>Supplier</th><th>QTY</th><th>Total</th><th>Ket.</th></tr></thead>

    </table>
    <div class="more-row" id="moreRow" onclick="tampilSemua()" style="display:none">Selengkapnya...</div>
  </div>
</div>
<div class="toast" id="toast"></div>
<nav class="bottom-nav">
  <a class="nav-item " href="dashboard.html"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Beranda</a>
  <a class="nav-item " href="Transaksi.html"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>Kasir</a>
  <a class="nav-item " href="Produk.html" style="position:relative"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg><span class="nav-badge" id="navBadge" style="display:none">0</span>Stok</a>
  <a class="nav-item active" href="Pembelian.html" data-owner-only="true"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>Masuk</a>

  <a class="nav-item " href="Laporan.html" data-owner-only="true"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>Laporan</a>
</nav>
<script>
// ── TOKO MEDURO – Auth & Role System ──
var AUTH_KEY = 'tokomeduro_auth';

function getSession() {
  var raw = sessionStorage.getItem(AUTH_KEY);
  return raw ? JSON.parse(raw) : null;
}

function doLogout() {
  sessionStorage.removeItem(AUTH_KEY);
  window.location.href = 'index.html';
}

function requireLogin() {
  var s = getSession();
  if (!s) { window.location.href = 'index.html'; return null; }
  return s;
}

function requireOwner() {
  var s = requireLogin();
  if (!s) return null;
  if (s.role !== 'owner') {
    alert('Halaman ini hanya dapat diakses oleh Owner.');
    window.location.href = 'dashboard.html';
    return null;
  }
  return s;
}

function renderUserBadge(id) {
  var s = getSession(); if (!s) return;
  var el = document.getElementById(id); if (!el) return;
  el.innerHTML =
    '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:1px">' +
    '<span style="font-size:11px;font-weight:700;color:#fff">' + s.nama + '</span>' +
    '<span style="font-size:9px;background:rgba(255,255,255,0.25);padding:1px 7px;border-radius:99px;color:#fff;text-transform:uppercase;letter-spacing:0.5px">' + s.role + '</span>' +
    '</div>';
}

function applyRoleAccess() {
  var s = getSession(); if (!s) return;
  if (s.role === 'kasir') {
    // Sembunyikan nav owner-only
    var ownerNavs = document.querySelectorAll('[data-owner-only="true"]');
    for (var i = 0; i < ownerNavs.length; i++) { ownerNavs[i].style.display = 'none'; }
    // Sembunyikan elemen edit/hapus/restock di stok barang
    var ownerEls = document.querySelectorAll('[data-owner-el="true"]');
    for (var j = 0; j < ownerEls.length; j++) { ownerEls[j].style.display = 'none'; }
  }
}

function updateNotifBadge() {
  var raw = localStorage.getItem('tokomeduro_notif') || '[]';
  var unread = JSON.parse(raw).filter(function(n){ return !n.dibaca; });
  var badge = document.getElementById('navBadge');
  if (!badge) return;
  if (unread.length > 0) {
    badge.textContent = unread.length;
    badge.style.display = 'flex';
    badge.style.background = '#7c3aed';
  } else {
    if (typeof getProduk === 'function') {
      var kritis = getProduk().filter(function(p){ return p.stok <= 3; }).length;
      if (kritis > 0) { badge.textContent = kritis; badge.style.display = 'flex'; badge.style.background = '#ef4444'; return; }
    }
    badge.style.display = 'none';
  }
}

</script>
<script>
// ── TOKO MEDURO – Shared Data Store (localStorage) ──

const DB_KEY     = 'tokomeduro_produk';
const TRX_KEY    = 'tokomeduro_transaksi';
const MASUK_KEY  = 'tokomeduro_barangmasuk';
const KELUAR_KEY = 'tokomeduro_barangkeluar';
const NOTIF_KEY  = 'tokomeduro_notif';

const DEFAULT_PRODUK = [
  { id:1,  nama:'Kansas 20',           kategori:'Rokok',   stok:3,  hargaBeli:16500, hargaJual:19000 },
  { id:2,  nama:'HS Kretek 12',        kategori:'Rokok',   stok:5,  hargaBeli:8750,  hargaJual:10000 },
  { id:3,  nama:'EspresoGold',         kategori:'Rokok',   stok:2,  hargaBeli:17700, hargaJual:20000 },
  { id:4,  nama:'Marlboro F Black 16', kategori:'Rokok',   stok:3,  hargaBeli:30601, hargaJual:35000 },
  { id:5,  nama:'Marlboro F Black 12', kategori:'Rokok',   stok:10, hargaBeli:23531, hargaJual:27000 },
  { id:6,  nama:'Mild 16',             kategori:'Rokok',   stok:6,  hargaBeli:35074, hargaJual:40000 },
  { id:7,  nama:'Inter FIM',           kategori:'Rokok',   stok:4,  hargaBeli:25900, hargaJual:29000 },
  { id:8,  nama:'Surya 16 Merah FSM',  kategori:'Rokok',   stok:3,  hargaBeli:34900, hargaJual:39000 },
  { id:9,  nama:'Surya 12',            kategori:'Rokok',   stok:10, hargaBeli:25850, hargaJual:29000 },
  { id:10, nama:'Gajah Baru 16',       kategori:'Rokok',   stok:10, hargaBeli:20650, hargaJual:23000 },
  { id:11, nama:'GB Premium',          kategori:'Rokok',   stok:6,  hargaBeli:16700, hargaJual:19000 },
  { id:12, nama:'Dunhil Hitam 12',     kategori:'Rokok',   stok:5,  hargaBeli:21400, hargaJual:24500 },
  { id:13, nama:'Aqua 600ml',          kategori:'Minuman', stok:24, hargaBeli:2500,  hargaJual:3500  },
  { id:14, nama:'Teh Botol 350ml',     kategori:'Minuman', stok:0,  hargaBeli:3200,  hargaJual:4000  },
  { id:15, nama:'Indomie Goreng',      kategori:'Makanan', stok:2,  hargaBeli:2800,  hargaJual:3500  },
];

// ── PRODUK ──
function getProduk() {
  var raw = localStorage.getItem(DB_KEY);
  if (!raw) { localStorage.setItem(DB_KEY, JSON.stringify(DEFAULT_PRODUK)); return DEFAULT_PRODUK; }
  return JSON.parse(raw);
}
function saveProduk(data) { localStorage.setItem(DB_KEY, JSON.stringify(data)); }
function tambahProdukBaru(p) {
  var list = getProduk();
  var newId = Math.max.apply(null, list.map(function(x){ return x.id; })) + 1;
  list.push(Object.assign({}, p, {id: newId}));
  saveProduk(list); return newId;
}
function updateProduk(id, changes) {
  var list = getProduk();
  var idx = list.findIndex(function(x){ return x.id === id; });
  if (idx > -1) { Object.assign(list[idx], changes); saveProduk(list); }
}
function hapusProdukById(id) { saveProduk(getProduk().filter(function(x){ return x.id !== id; })); }
function tambahStok(id, qty) {
  var list = getProduk();
  var p = list.find(function(x){ return x.id === id; });
  if (p) { p.stok += qty; saveProduk(list); }
}
function kurangiStok(id, qty) {
  var list = getProduk();
  var p = list.find(function(x){ return x.id === id; });
  if (p) { p.stok = Math.max(0, p.stok - qty); saveProduk(list); }
}

// ── TRANSAKSI ──
function getTransaksi() { return JSON.parse(localStorage.getItem(TRX_KEY) || '[]'); }
function tambahTransaksi(trx) {
  var list = getTransaksi(); list.unshift(trx);
  localStorage.setItem(TRX_KEY, JSON.stringify(list));
}

// ── BARANG MASUK ──
function getBarangMasuk() { return JSON.parse(localStorage.getItem(MASUK_KEY) || '[]'); }
function tambahBarangMasuk(item) {
  var list = getBarangMasuk(); list.unshift(item);
  localStorage.setItem(MASUK_KEY, JSON.stringify(list));
}

// ── BARANG KELUAR ──
function getBarangKeluar() { return JSON.parse(localStorage.getItem(KELUAR_KEY) || '[]'); }
function tambahBarangKeluar(item) {
  var list = getBarangKeluar(); list.unshift(item);
  localStorage.setItem(KELUAR_KEY, JSON.stringify(list));
}

// ── NOTIFIKASI ──
function getNotif() { return JSON.parse(localStorage.getItem(NOTIF_KEY) || '[]'); }
function tambahNotif(item) {
  var list = getNotif(); list.unshift(item);
  localStorage.setItem(NOTIF_KEY, JSON.stringify(list));
}
function tandaiNotifDibaca() {
  var list = getNotif().map(function(n){ n.dibaca = true; return n; });
  localStorage.setItem(NOTIF_KEY, JSON.stringify(list));
}
function getUnreadNotif() { return getNotif().filter(function(n){ return !n.dibaca; }); }

// ── UTILS ──
function formatRp(n) { return 'Rp ' + (n||0).toLocaleString('id-ID'); }
function getNomorTrx() {
  var n = parseInt(localStorage.getItem('tokomeduro_trx_counter') || '0') + 1;
  localStorage.setItem('tokomeduro_trx_counter', n);
  return '#TRX-' + String(n).padStart(4,'0');
}

</script>
<script>
var showAll=false, LIMIT=8;
function populateProduk(){
  var list=getProduk();
  var sel=document.getElementById('fProduk');
  sel.innerHTML='<option value="">Pilih Produk</option>'+list.map(function(p){return '<option value="'+p.id+'">'+p.nama+' (Stok: '+p.stok+')</option>';}).join('');
  var r=new URLSearchParams(window.location.search).get('restock');
  if(r) sel.value=r;
}
function renderRiwayat(){
  var r=getBarangMasuk();
  var shown=showAll?r:r.slice(0,LIMIT);
  document.getElementById('moreRow').style.display=(!showAll&&r.length>LIMIT)?'block':'none';
  document.getElementById('riwayatBody').innerHTML=r.length===0
    ?'<tr><td colspan="6" style="text-align:center;padding:20px;color:#9ca3af;font-size:12px">Belum ada riwayat</td></tr>'
    :shown.map(function(x){return '<tr><td style="font-size:10px;color:#6b7280">'+x.tanggal+'</td><td class="prod-name">'+x.produk+'</td><td style="font-size:10px">'+x.supplier+'</td><td><span class="qty-badge">+'+x.qty+'</span></td><td style="font-size:10px">'+formatRp(x.qty*x.harga)+'</td><td style="font-size:10px">'+x.ket+'</td></tr>';}).join('');
}
function tampilSemua(){showAll=true;renderRiwayat();}
function simpanBarang(){
  var produkId=document.getElementById('fProduk').value;
  var supplier=document.getElementById('fSupplier').value.trim();
  var jumlah=parseInt(document.getElementById('fJumlah').value)||0;
  var harga=parseInt(document.getElementById('fHarga').value)||0;
  var tanggal=document.getElementById('fTanggal').value;
  var ket=document.getElementById('fKet').value.trim()||'-';
  if(!produkId){showToast('Pilih produk!',false);return;}
  if(!supplier){showToast('Supplier wajib diisi!',false);return;}
  if(jumlah<1){showToast('Jumlah minimal 1!',false);return;}
  if(!tanggal){showToast('Tanggal wajib diisi!',false);return;}
  var p=getProduk().find(function(x){return x.id==produkId;});
  var nama=p?p.nama:'-';
  tambahStok(parseInt(produkId),jumlah);
  if(harga>0) updateProduk(parseInt(produkId),{hargaBeli:harga});
  tambahBarangMasuk({tanggal:tanggal,produk:nama,produkId:parseInt(produkId),supplier:supplier,qty:jumlah,harga:harga,ket:ket,oleh:'Admin'});
  // Simpan notifikasi barang masuk
  var notif=getNotif();
  notif.unshift({id:Date.now(),produk:nama,jumlah:jumlah,tanggal:tanggal,dibaca:false,waktu:new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})});
  localStorage.setItem('tokomeduro_notif',JSON.stringify(notif));
  ['fProduk','fSupplier','fJumlah','fHarga','fKet'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('fTanggal').value=new Date().toISOString().split('T')[0];
  showToast('Stok '+nama+' +'+jumlah+' pcs! Notif terkirim ke kasir 🎉');
}
function showToast(msg,ok){
  var t=document.getElementById('toast');
  t.textContent=msg;t.style.background=(ok===false)?'rgba(220,60,60,0.9)':'rgba(34,160,90,0.92)';
  t.style.display='block';setTimeout(function(){t.style.display='none';},2500);
}
document.getElementById('fTanggal').value=new Date().toISOString().split('T')[0];

// ── INIT ──
requireOwner();
renderUserBadge("userBadge");
applyRoleAccess();
updateNotifBadge();
populateProduk();
renderRiwayat();
</script>
